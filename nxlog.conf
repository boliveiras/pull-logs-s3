########################################################################
# NXLog - configuração de coleta (Windows)
#
# Compatível com NXLog Community Edition (nxlog-ce).
# Todos os módulos usados aqui (im_msvistalog, im_file, om_udp, om_file,
# xm_syslog, xm_charconv, xm_fileop, pm_transformer) existem na CE.
#
# Antes de usar, ajuste os "define" abaixo (host/portas do SIEM e caminhos).
# Valores de exemplo estão genéricos de propósito.
########################################################################

## Configurações globais
Panic Soft
FlowControl True
LogLevel INFO

## Caminhos da instalação
define ROOT     C:\Program Files\nxlog
define CERTDIR  %ROOT%\cert
define CONFDIR  %ROOT%\conf\nxlog.d
define LOGDIR   %ROOT%\data
define LOGFILE  %LOGDIR%\nxlog.log
LogFile %LOGFILE%

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data

## --- AJUSTE AQUI: destino do SIEM ---
# Troque pelo IP/portas do seu coletor SIEM.
define SIEM_HOST          10.0.0.10
define SIEM_PORT_WINEVT   5985
define SIEM_PORT_CF       5503

## --- AJUSTE AQUI: pasta dos logs da Cloudflare ---
define CF_LOGDIR  D:\Cloudflare

#####################  Extensões  ######################################

<Extension _syslog>
    Module      xm_syslog
</Extension>

<Extension _charconv>
    Module      xm_charconv
    AutodetectCharsets iso8859-2, utf-8, utf-16, utf-32
</Extension>

<Extension _exec>
    Module      xm_exec
</Extension>

# Rotação dos próprios logs do NXLog + limpeza dos logs já processados
<Extension _fileop>
    Module      xm_fileop

    # A cada hora, rotaciona o log do NXLog se passar de 50 MB
    <Schedule>
        Every 1 hour
        <Exec>
            if (file_exists('%LOGFILE%') and file_size('%LOGFILE%') >= 50M)
                file_cycle('%LOGFILE%', 50);
        </Exec>
    </Schedule>

    # Rotação semanal (domingo à meia-noite)
    <Schedule>
        When @weekly
        Exec if file_exists('%LOGFILE%') file_cycle('%LOGFILE%', 50);
    </Schedule>

    # Remove logs da Cloudflare já processados (mais de ~25h / 90000s)
    <Schedule>
        Every 25 hour
        Exec file_remove('%CF_LOGDIR%\Logs\*_*.log', now() - 90000);
        Exec file_remove('%CF_LOGDIR%\*_*.gz',       now() - 90000);
    </Schedule>
</Extension>

#####################  Processadores  ##################################

<Processor eventlog_transformer>
    Module pm_transformer
    Exec $Hostname = hostname();
</Processor>

#####################  Entrada: Windows Event Log  #####################

<Input eventlog_in>
    Module        im_msvistalog
    ReadFromLast  True
    BatchSize     25
    SavePos       True
    PollInterval  2
    ResolveGUID   True
    ResolveSID    True

    <QueryXML>
        <QueryList>
            <Query Id="0" Path="Security">
                <Select Path="Security">*[System[(EventID=1102 or EventID=4624 or EventID=4625 or EventID=4648 or EventID=4663 or EventID=4688 or EventID=4697 or EventID=4698 or EventID=4720 or EventID=4722 or EventID=4724 or EventID=4725 or EventID=4727 or EventID=4728 or EventID=4729 or EventID=5141 or EventID=5142 or EventID=4730 or EventID=4731 or EventID=4733 or EventID=4734 or EventID=4737 or EventID=4738)]]</Select>
            </Query>
            <Query Id="1" Path="Security">
                <Select Path="Security">*[System[(EventID=4732 or EventID=5137 or EventID=4740 or EventID=4657 or EventID=4741 or EventID=4743 or EventID=4754 or EventID=4756 or EventID=4757 or EventID=4758 or EventID=4768 or EventID=4769 or EventID=4771 or EventID=4776 or EventID=5136 or EventID=5140 or EventID=5145 or EventID=5168 or EventID=4726 or EventID=4798 or EventID=4799)]]</Select>
            </Query>
            <Query Id="3" Path="ForwardedEvents">
                <Select Path="ForwardedEvents">*</Select>
            </Query>
            <Query Id="4" Path="Setup">
                <Select Path="Setup">*</Select>
            </Query>
            <Query Id="5" Path="Microsoft-Windows-PowerShell/Operational">
                <Select Path="Microsoft-Windows-PowerShell/Operational">*[System[(EventID=40961 or EventID=40962 or EventID=4103 or EventID=4104)]]</Select>
            </Query>
            <Query Id="6" Path="Windows PowerShell">
                <Select Path="Windows PowerShell">*</Select>
            </Query>
            <Query Id="7" Path="Application">
                <Select Path="Application">*[System[(EventID=11707)]]</Select>
            </Query>
            <Query Id="8" Path="System">
                <Select Path="System">*</Select>
            </Query>
            <Query Id="9" Path="Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational">
                <Select Path="Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational">*[System[(EventID=1149)]]</Select>
            </Query>
        </QueryList>
    </QueryXML>
</Input>

#####################  Saídas  ########################################

# Cópia local rotacionada dos eventos do Windows (por severidade/hora)
<Output eventlog_rotate>
    define OUT_DIR C:\Program Files\nxlog\data
    Module om_file
    File '%OUT_DIR%\' + $Severity + strftime(now(),'_%Y-%m-%d-%H') + '.log'

    <Schedule>
        Every 1 hour
        Exec file_remove('%OUT_DIR%\*_*.log',    now() - 10800);
        Exec file_remove('%OUT_DIR%\nxlog.log.*', now() - 64800);
    </Schedule>
</Output>

# Envio dos eventos do Windows para o SIEM (UDP)
<Output udp_syslog_out>
    Module      om_udp
    Host        %SIEM_HOST%
    Port        %SIEM_PORT_WINEVT%
</Output>

#####################  Entrada: logs da Cloudflare  ###################
# Lê os .log que o script Python deixa nesta pasta.

<Input cloudflare_logs>
    Module        im_file
    File          "%CF_LOGDIR%\Logs\*.log"
    PollInterval  1
    ReadFromLast  True
    SavePos       True
</Input>

# Envio dos logs da Cloudflare para o SIEM (UDP, porta dedicada)
<Output siem_output>
    Module      om_udp
    Host        %SIEM_HOST%
    Port        %SIEM_PORT_CF%
</Output>

#####################  Rotas  #########################################

<Route windows_events>
    Path eventlog_in => eventlog_transformer => udp_syslog_out, eventlog_rotate
</Route>

<Route send_cloudflare_logs>
    Path cloudflare_logs => siem_output
</Route>
