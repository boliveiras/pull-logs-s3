########################################################################
# NXLog - configuração de coleta (Windows)
#
# Compatível com NXLog Community Edition (nxlog-ce).
# Todos os módulos usados aqui (im_msvistalog, im_file, om_udp, om_file,
# xm_syslog, xm_charconv, xm_fileop, pm_transformer) existem na CE.
#
# Antes de usar, ajuste os "define" abaixo (host/portas do SIEM e caminhos).
# Valores de exemplo estão genéricos de propósito.
########################################################################

## Configurações globais
Panic Soft
FlowControl True
LogLevel INFO

## Caminhos da instalação
define ROOT     C:\Program Files\nxlog
define CERTDIR  %ROOT%\cert
define CONFDIR  %ROOT%\conf\nxlog.d
define LOGDIR   %ROOT%\data
define LOGFILE  %LOGDIR%\nxlog.log
LogFile %LOGFILE%

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data

## --- AJUSTE AQUI: destino do SIEM ---
# Troque pelo IP/portas do seu coletor SIEM.
define SIEM_HOST          10.0.0.10
define SIEM_PORT_WINEVT   5985
define SIEM_PORT_S3        5503

## --- AJUSTE AQUI: pastas do staging ---
## LOG_DIR: onde os .log prontos ficam (= PULL_LOG_DIR do script). O agente lê daqui.
## GZ_DIR:  onde os .gz baixados ficam (= PULL_BASE_DIR), usado só para limpeza.
define LOG_DIR  D:\Logs\Tecnologia
define GZ_DIR   D:\Logs

#####################  Extensões  ######################################

<Extension _syslog>
    Module      xm_syslog
</Extension>

<Extension _charconv>
    Module      xm_charconv
    AutodetectCharsets iso8859-2, utf-8, utf-16, utf-32
</Extension>

<Extension _exec>
    Module      xm_exec
</Extension>

# Rotação dos próprios logs do NXLog + limpeza dos logs já processados
<Extension _fileop>
    Module      xm_fileop

    # A cada hora, rotaciona o log do NXLog se passar de 50 MB
    <Schedule>
        Every 1 hour
        <Exec>
            if (file_exists('%LOGFILE%') and file_size('%LOGFILE%') >= 50M)
                file_cycle('%LOGFILE%', 50);
        </Exec>
    </Schedule>

    # Rotação semanal (domingo à meia-noite)
    <Schedule>
        When @weekly
        Exec if file_exists('%LOGFILE%') file_cycle('%LOGFILE%', 50);
    </Schedule>

    # Remove logs já processados do staging (mais de ~25h / 90000s)
    <Schedule>
        Every 25 hour
        Exec file_remove('%LOG_DIR%\*_*.log', now() - 90000);
        Exec file_remove('%GZ_DIR%\*_*.gz',   now() - 90000);
    </Schedule>
</Extension>

#####################  Processadores  ##################################

<Processor eventlog_transformer>
    Module pm_transformer
    Exec $Hostname = hostname();
</Processor>

#####################  Entrada: Windows Event Log  #####################

<Input eventlog_in>
    Module        im_msvistalog
    ReadFromLast  True
    BatchSize     25
    SavePos       True
    PollInterval  2
    ResolveGUID   True
    ResolveSID    True

    <QueryXML>
        <QueryList>
            <Query Id="0" Path="Security">
                <Select Path="Security">*</Select>
            </Query>
            <Query Id="1" Path="ForwardedEvents">
                <Select Path="ForwardedEvents">*</Select>
            </Query>
            <Query Id="2" Path="Setup">
                <Select Path="Setup">*</Select>
            </Query>
            <Query Id="3" Path="Microsoft-Windows-PowerShell/Operational">
                <Select Path="Microsoft-Windows-PowerShell/Operational">*</Select>
            </Query>
            <Query Id="4" Path="Windows PowerShell">
                <Select Path="Windows PowerShell">*</Select>
            </Query>
            <Query Id="5" Path="Application">
                <Select Path="Application">*</Select>
            </Query>
            <Query Id="6" Path="System">
                <Select Path="System">*</Select>
            </Query>
            <Query Id="7" Path="Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational">
                <Select Path="Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational">*</Select>
            </Query>
        </QueryList>
    </QueryXML>
</Input>

#####################  Saídas  ########################################

# Cópia local rotacionada dos eventos do Windows (por severidade/hora)
<Output eventlog_rotate>
    define OUT_DIR C:\Program Files\nxlog\data
    Module om_file
    File '%OUT_DIR%\' + $Severity + strftime(now(),'_%Y-%m-%d-%H') + '.log'

    <Schedule>
        Every 1 hour
        Exec file_remove('%OUT_DIR%\*_*.log',    now() - 10800);
        Exec file_remove('%OUT_DIR%\nxlog.log.*', now() - 64800);
    </Schedule>
</Output>

# Envio dos eventos do Windows para o SIEM (UDP)
<Output udp_syslog_out>
    Module      om_udp
    Host        %SIEM_HOST%
    Port        %SIEM_PORT_WINEVT%
</Output>

#####################  Entrada: logs do S3 (staging)  #################
# Lê os .log que o script Python deixa nesta pasta.

<Input s3_logs>
    Module        im_file
    File          "%LOG_DIR%\*.log"
    PollInterval  1
    ReadFromLast  True
    SavePos       True
</Input>

# Envio dos logs do staging para o SIEM (UDP, porta dedicada)
<Output siem_output>
    Module      om_udp
    Host        %SIEM_HOST%
    Port        %SIEM_PORT_S3%
</Output>

#####################  Rotas  #########################################

<Route windows_events>
    Path eventlog_in => eventlog_transformer => udp_syslog_out, eventlog_rotate
</Route>

<Route send_s3_logs>
    Path s3_logs => siem_output
</Route>
